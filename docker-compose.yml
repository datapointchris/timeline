name: timeline

services:
  timeline:
    image: ghcr.io/datapointchris/timeline:latest
    container_name: timeline
    restart: unless-stopped
    ports:
      - '80:3000'
    env_file: /etc/timeline/.env
    volumes:
      - /var/db/timeline:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
