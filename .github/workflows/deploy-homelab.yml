name: Deploy to Homelab (Manual)

on:
  workflow_dispatch:

# Manual redeploy trigger.
#
# Normal deploys: push to main → CI builds and pushes image to ghcr.io →
# GitHub fires `workflow_run.completed` → app-ops webhook receives it →
# `deploy-timeline.sh` SSHes to timeline-lxc and runs `docker compose pull && up -d`.
#
# This workflow is for "redeploy whatever is currently :latest on ghcr.io
# without making a new commit". Useful after a manual image push, or to
# restart the stack on timeline-lxc. It does not rebuild — it only fires the
# webhook so the LXC pulls the current :latest image and restarts the
# container.

jobs:
  redeploy:
    name: Trigger redeploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger homelab deploy webhook
        run: |
          PAYLOAD="{\"action\":\"completed\",\"workflow_run\":{\"id\":${{ github.run_id }},\"conclusion\":\"success\",\"head_branch\":\"main\"},\"repository\":{\"full_name\":\"${{ github.repository }}\",\"name\":\"timeline\"}}"
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac '${{ secrets.WEBHOOK_SECRET }}' | cut -d' ' -f2)
          curl --fail -X POST https://hooks.ichrisbirch.com/hooks/timeline \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -d "$PAYLOAD"
