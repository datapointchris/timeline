fail_fast: false

repos:
  # Conventional commits enforcement
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        stages: [pre-commit]
      - id: check-executables-have-shebangs
        stages: [pre-commit]
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit]
      - id: check-added-large-files
        args: ['--maxkb=1000']
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: mixed-line-ending
        args: ['--fix=lf']
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]

  # JSON5 support (for tsconfig.json with comments)
  - repo: https://gitlab.com/bmares/check-json5
    rev: v1.0.0
    hooks:
      - id: check-json5
        stages: [pre-commit]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args: [--fix]
        stages: [pre-commit]

  # Shell script linting
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        stages: [pre-commit]

  # Spell checking
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        stages: [pre-commit]
        args: [--skip, '*.lock,package-lock.json,*.db']

  # TypeScript/JavaScript linting and formatting
  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: npx eslint --fix
        language: system
        types: [ts, tsx, javascript, jsx]
        stages: [pre-commit]
        pass_filenames: true

      - id: prettier
        name: Prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [ts, tsx, javascript, jsx, json, css, scss, html, vue, markdown, yaml]
        stages: [pre-commit]
        pass_filenames: true

      - id: typescript-check
        name: TypeScript Type Check
        entry: bash -c 'cd server && npx tsc --noEmit'
        language: system
        types: [ts]
        stages: [pre-commit]
        pass_filenames: false

      - id: vitest
        name: Run Tests
        entry: npm test
        language: system
        types: [ts]
        stages: [pre-commit]
        pass_filenames: false

      # Strip Claude Code branding from commit messages
      - id: prepare-commit-msg
        name: Strip AI branding from commits
        entry: /Users/chris/.claude/hooks/prepare-commit-msg
        language: system
        always_run: true
        stages: [prepare-commit-msg]
